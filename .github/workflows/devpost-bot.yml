name: Devpost to Discord

on:
  schedule:
    # Once per day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync hackathons to Discord
        env:
          WEBHOOK_100K_PLUS: ${{ secrets.WEBHOOK_100K_PLUS }}
          WEBHOOK_10K_100K: ${{ secrets.WEBHOOK_10K_100K }}
          WEBHOOK_UNDER_10K: ${{ secrets.WEBHOOK_UNDER_10K }}
          WEBHOOK_FREE: ${{ secrets.WEBHOOK_FREE }}
        run: python main.py

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update Discord message state"
          git push
